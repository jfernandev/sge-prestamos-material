{% extends 'base.html' %}
{% block content %}
<h1>Confirmar borrado</h1>
<p>¿Seguro que quieres borrar el material "{{ object.nombre }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Sí, borrar</button>
    <a href="{% url 'material_list' %}">Cancelar</a>
</form>
{% endblock %}
